# Render Blueprint — deploys the whole DriveEasy app (database + backend + frontend).
# In the Render dashboard: New > Blueprint, connect this repo, and Render reads this file.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: driveeasy-db
    plan: free
    databaseName: carrental
    user: carrental

services:
  # ---- Backend: Spring Boot REST API (Docker) ----
  - type: web
    name: driveeasy-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /swagger-ui.html
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: driveeasy-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: driveeasy-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: driveeasy-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: driveeasy-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: driveeasy-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true
      # Set this to your frontend URL after the first deploy (see DEPLOY.md)
      - key: APP_CORS_ORIGINS
        sync: false

  # ---- Frontend: React + Vite static site ----
  - type: web
    name: driveeasy-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA: send all unknown paths to index.html so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend URL + /api after the first deploy (see DEPLOY.md)
      - key: VITE_API_URL
        sync: false
