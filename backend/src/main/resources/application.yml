spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    # Base64-friendly secret; override in production via APP_JWT_SECRET env var
    secret: ${APP_JWT_SECRET:Y2FyLXJlbnRhbC1zdXBlci1zZWNyZXQta2V5LWNoYW5nZS1tZS1wbGVhc2UtMTIzNDU2Nzg5MA==}
    expiration-ms: 86400000   # 24h
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

---
# DEV: in-memory H2, runs with zero external setup
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:carrental;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

---
# PROD/MySQL profile
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:car_rental}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
